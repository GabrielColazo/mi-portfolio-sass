<head>    
    <meta charset="UTF-8">

    <!-- titulo de mi página -->
    <title>Contacto | Trabajemos juntos en tu próximo proyecto - GaboWeb</title>
    <!--descripción SEO-->
    <meta name="description" content="¿Tenés un proyecto en mente? Ponete en contacto con GaboWeb para asesoramiento personalizado y presupuestos sin cargo. Trabajamos de forma remota para potenciar tu marca desde cualquier lugar.">
    <!--Enlace de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    
    <!-- CSS externo-->   
    <link rel="stylesheet" href="../css/style.css">
    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
     <!-- una imagen favicon para la ventana -->
    <link rel="icon" type="image/png" href="../img/favicon.png">

</head>
<body>

  <!-- Cartel de rebajas de compra, realizado en Bootstrap-->
  <div class="text-center py-3 fs-4 border-bottom border-warning text-white bg-dark position-sticky top-0" 
     style="z-index:1030; font-family: 'Space Grotesk', sans-serif;">
  <span class="fw-bold">🔥 ¡Solo por hoy! 🔥</span>
  <span class="text-warning">30% OFF</span> en cualquier diseño
</div>

     <header>   <!-- el header contiene el menu de navegacion-->
                                       
        <nav class="navegacion"> <!-- una sola barra de navegación--> 
         
          <a href="../index.html" class="navegacion-logo"> <!--desde el logo se puede volver al inicio-->
         Gabo<span class="logo-web">Web</span> <!-- el logo de la pagina es GaboWeb-->
         </a>
          

            <!--lista desordenada que contiene cada uno de los enlaces de todo el sitio web--> 
            <!-- la lista desordenada contiene index, proyectos, sobre-mi y contacto-->
            <ul class="navegacion-lista"> <!-- una sola barra de navegación--> 
                 <li>
                    <a href="../index.html" title="Ir a la página de inicio de GaboWeb">Inicio</a>
                </li>
                 <li>
                    <a href="../pages/proyectos.html" title="Ver mis trabajos de desarrollo web">Proyectos</a>
                </li>
                 <li>
                    <a href="../pages/sobre-mi.html" title="Conocé más sobre Gabriel Colazo y GaboWeb">Sobre Mí</a>
                </li>
                <li>
                    <a href="../pages/contacto.html" title="Pedí tu presupuesto personalizado">Contacto</a>
                </li>
            </ul>
        </nav>

    </header>

            
        <main>

          <section class="contacto-section"> <!-- un section contiene todo el formulario completo-->
              <div class="titulo">
              <h1 class="titulo-principal">
             Gabo<span>Web</span> | Contacto
             </h1>

            <h2 class="subtitulo">
            Enviame tu consulta
            </h2>

           <hr class="linea">
         </div>


            <!--comienza formulario-->
        <form class="form" action="#" method="post">

              <div class="form-field">
                   <label class="form-label" for="nombre">Nombre</label>
                    <input class="form-input" type="text" id="nombre" name="nombre" required>
               </div>

             <div class="form-field">
                   <label class="form-label" for="email">Email</label>
                   <input class="form-input" type="email" id="email" name="email" required>
            </div>

            <div class="form-field">
                <label class="form-label" for="mensaje">Mensaje</label>
                 <textarea class="form-textarea" id="mensaje" name="mensaje" rows="5"></textarea>
            </div>

          <fieldset class="form-field form-field--group"> <!--titulo a grupo de opciones-->
                  <legend class="form-legend">Motivo de contacto</legend>
                  <label class="form-option">
                  <input class="form-radio" type="radio" name="motivo">
                 Consulta
          </label>

         <label class="form-option">
                <input class="form-radio" type="radio" name="motivo">
                Proyecto
        </label>
     
          <label class="form-option">
                <input class="form-radio" type="radio" name="motivo">
               Otro
              </label>
          </fieldset>

        <div class="form-field">
             <label class="form-option">
             <input class="form-checkbox" type="checkbox" name="novedades">
              Quiero recibir novedades
             </label>
          </div>

            <button class="form-button" type="submit">Enviar</button> <!--botón de enviar es el único-->

</form> <!--fin de formulario-->

        </section>        

       </main>

<!-- aca comienza el footer-->
    <footer class="footer">

  <div class="footer-bandera"> <!-- la bandera argentina dentro del footer-->
    <img src="../img/banderaarg.svg" alt="Bandera Argentina">
  </div>

    Gabriel Colazo – Diseñador Web | Todos los derechos reservados © 2026
  </p>

  <div class="footer-social"> <!-- en el footer agrego redes sociales-->
    <img src="../img/instagram.svg" alt="Seguime en Instagram de GaboWeb">
    <img src="../img/facebook.svg" alt="Visitar el Facebook de GaboWeb">
    <img src="../img/whatsapp.svg" alt="Contactar a GaboWeb por WhatsApp">
  </div>

</footer> <!-- aqui finaliza el footer-->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
